name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run pytest
        env:
          # Dùng SQLite in-memory cho test, không đụng tới Neon/Render
          DATABASE_URL: sqlite:///:memory:
          PYTHONPATH: .
        run: pytest -q

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        # Có thể bỏ VITE_API_BASE_URL nếu frontend dùng relative /api/v1
        env:
          VITE_API_BASE_URL: http://localhost:5000/api/v1
        run: npm run build

