name: Deploy to Render

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/todo-app-flask-reactjs-app
          TAG=${{ github.sha }}
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: |
          echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }} \
            -t ${{ steps.meta.outputs.image }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
          docker push ${{ steps.meta.outputs.image }}:latest

  deploy-to-render:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

