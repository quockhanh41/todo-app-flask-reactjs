name: Todo App CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Test Backend
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: './backend/requirements.txt'
      - name: Install Backend Dependencies
        working-directory: ./backend
        run: |
          pip install pytest
          pip install -r requirements.txt
      - name: Run Backend Tests
        working-directory: ./backend
        run: pytest

      # 2. Lint Frontend
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Lint Frontend
        working-directory: ./frontend
        run: npm run lint

  build-and-push:
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # Only build and push on main branch
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          # We use lowercase conversion for docker tags since GitHub handles might contain uppercase
          tags: ghcr.io/${{ github.repository_owner }}/todo-backend:latest,ghcr.io/${{ github.repository_owner }}/todo-backend:${{ github.sha }}

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/todo-frontend:latest,ghcr.io/${{ github.repository_owner }}/todo-frontend:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}

  deploy-to-render:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Backend Deployment
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}" ]; then
            echo "Triggering backend Render deployment..."
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}"
          else
            echo "RENDER_DEPLOY_HOOK_BACKEND secret is not set. Skipping."
          fi

      - name: Trigger Render Frontend Deployment
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}" ]; then
            echo "Triggering frontend Render deployment..."
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}"
          else
            echo "RENDER_DEPLOY_HOOK_FRONTEND secret is not set. Skipping."
          fi
