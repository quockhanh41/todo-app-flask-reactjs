services:
  # 1. Flask Backend Web Service
  - type: web
    name: todo-backend
    env: python
    region: singapore
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && flask db upgrade"
    startCommand: "gunicorn application:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        sync: false # User will provide the NeonDB connection string in the Render Dashboard
      - key: JWT_SECRET_KEY
        generateValue: true # Render will automatically generate a secure random string

  # 3. ReactJS Frontend Static Site
  - type: web
    name: todo-frontend
    env: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist" # Vite outputs to the 'dist' folder
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: todo-backend
          property: host
          format: "https://{host}/api/v1" # Injects the actual deployed backend URL during build
    routes:
      # This ensures React Router handles all requests inside the SPA correctly
      - type: rewrite
        source: /*
        destination: /index.html
