services:
  # 1. PostgreSQL Database Service
  - type: psql
    name: todo-db
    plan: free # Render's free tier for databases (valid for 90 days)
    region: singapore # Change to your preferred region (e.g., oregon, frankfurt)
    postgresMajorVersion: 16

  # 2. Flask Backend Web Service
  - type: web
    name: todo-backend
    env: python
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && flask db upgrade"
    startCommand: "gunicorn application:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: todo-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true # Render will automatically generate a secure random string

  # 3. ReactJS Frontend Static Site
  - type: web
    name: todo-frontend
    env: static
    plan: free # Static sites are always free on Render
    region: singapore
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist" # Vite outputs to the 'dist' folder
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: todo-backend
          property: host
          format: "https://{host}/api/v1" # Injects the actual deployed backend URL during build
    routes:
      # This ensures React Router handles all requests inside the SPA correctly
      - type: rewrite
        source: /*
        destination: /index.html
